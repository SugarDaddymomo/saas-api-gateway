    data:
        redis:
            host: localhost
            port: 6379

    jackson:
        time-zone: UTC
    datasource:
        url: jdbc:postgresql://localhost:15432/saas_gateway?options=-c%20TimeZone=UTC
        username: postgres
        password: postgres

    jpa:
        open-in-view: false

        hibernate:
            ddl-auto: validate

        properties:
            hibernate:
                jdbc:
                    time_zone: UTC
                format_sql: true


    application:
        name: gateway-service



server:
    port: 8082